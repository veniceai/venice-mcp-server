name: Publish to npm

on:
  release:
    types:
      - published

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    env:
      REGISTRY_URL: https://registry.npmjs.org

    steps:
      - name: Check out release target
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0

      - name: Verify release target branch
        id: target
        shell: bash
        run: |
          set -euo pipefail

          target="${{ github.event.release.target_commitish }}"
          if ! git ls-remote --exit-code --heads origin "$target" >/dev/null; then
            echo "::error::Release target '${target}' is not a branch. Refusing to publish because the version bump cannot be committed back safely."
            exit 1
          fi

          echo "branch=${target}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: ${{ env.REGISTRY_URL }}

      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Set package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ github.event.release.tag_name }}"
          semver_pattern='^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'

          if [[ "$release_tag" =~ $semver_pattern ]]; then
            package_version="${release_tag#v}"
            npm version "$package_version" --no-git-tag-version --allow-same-version
            version_source="release tag"
          else
            package_version="$(npm version patch --no-git-tag-version)"
            package_version="${package_version#v}"
            version_source="patch bump"
          fi

          package_name="$(node -p "require('./package.json').name")"

          echo "Using ${package_name}@${package_version} from ${version_source}."
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Check npm package version
        id: npm_status
        shell: bash
        run: |
          set -euo pipefail

          package_name="${{ steps.version.outputs.package_name }}"
          package_version="${{ steps.version.outputs.package_version }}"

          if npm view "${package_name}@${package_version}" version --registry "$REGISTRY_URL" >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already exists on npm; skipping publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "${package_name}@${package_version} is not published yet."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_status.outputs.exists != 'true'
        run: npm publish --provenance --access public

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json package-lock.json; then
            echo "No version changes to commit."
            exit 0
          fi

          package_version="${{ steps.version.outputs.package_version }}"

          git add package.json package-lock.json
          git -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: release v${package_version} [skip ci]"
          git push origin "HEAD:${{ steps.target.outputs.branch }}"
